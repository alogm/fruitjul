<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>¡Mensaje Enviado! | FRUIT JULS</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
      ::selection {
        background-color: #ec4899; /* pink-500 */
        color: white;
      }
      
      /* Animación del check flotante */
      @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
        100% { transform: translateY(0px); }
      }
      .animate-float {
        animation: float 3s ease-in-out infinite;
      }
    </style>
  </head>
  <body class="min-h-screen bg-black text-neutral-200 font-sans flex flex-col relative overflow-hidden">
    
    <!-- NAVBAR (Simplificado para esta página) -->
    <nav class="absolute w-full z-50 bg-transparent py-5">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-center md:justify-start items-center">
          <a href="index.html" class="text-2xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-orange-400 via-pink-500 to-blue-500 hover:opacity-80 transition-opacity">
            FRUIT JULS
          </a>
        </div>
      </div>
    </nav>

    <!-- MAIN CONTENT: MENSAJE DE ÉXITO -->
    <main class="flex-grow flex items-center justify-center relative px-4">
      
      <!-- Decoración de fondo espectacular -->
      <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-[20%] left-[20%] w-[30%] h-[30%] rounded-full bg-green-500/20 blur-[120px]"></div>
        <div class="absolute bottom-[20%] right-[20%] w-[40%] h-[40%] rounded-full bg-blue-500/20 blur-[100px]"></div>
      </div>

      <div class="max-w-2xl w-full bg-neutral-900/80 backdrop-blur-xl p-10 md:p-16 rounded-[2.5rem] border border-neutral-800 text-center relative z-10 shadow-2xl">
        
        <!-- Icono de éxito animado -->
        <div class="w-24 h-24 mx-auto bg-gradient-to-tr from-green-400 to-blue-500 rounded-full flex items-center justify-center mb-8 shadow-[0_0_40px_rgba(74,222,128,0.3)] animate-float border-4 border-black">
          <i data-lucide="check" class="text-white w-12 h-12 stroke-[3]"></i>
        </div>

        <h1 class="text-4xl md:text-5xl font-black text-white mb-4 leading-tight">
          ¡Mensaje <span class="text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-blue-400">Enviado!</span>
        </h1>
        
        <p class="text-lg text-neutral-400 mb-10 max-w-md mx-auto">
          Hemos recibido tu solicitud correctamente. Nuestro equipo revisará tu información y se pondrá en contacto contigo a la brevedad.
        </p>

        <!-- Botones de acción -->
        <div class="flex flex-col sm:flex-row gap-4 justify-center">
          <a href="index.html" class="px-8 py-4 rounded-full bg-neutral-800 text-white font-bold text-lg hover:bg-neutral-700 transition-all flex items-center justify-center gap-2">
            <i data-lucide="home" class="w-5 h-5"></i> Volver al Inicio
          </a>
          <a href="productos.html" class="px-8 py-4 rounded-full bg-gradient-to-r from-orange-500 to-pink-600 text-white font-bold text-lg hover:shadow-lg hover:shadow-pink-500/40 transition-all flex items-center justify-center gap-2 transform hover:-translate-y-1">
            <i data-lucide="shopping-bag" class="w-5 h-5"></i> Ver Catálogo
          </a>
        </div>

      </div>
    </main>

    <!-- LOGIC SCRIPT -->
    <script>
      // Inicializar Lucide Icons
      lucide.createIcons();
    </script>
  </body>
</html>
