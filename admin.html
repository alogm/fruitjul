<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - FRUIT JULS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-screen bg-neutral-950 text-neutral-200 font-sans">

  <main id="login-view" class="flex min-h-screen items-center justify-center p-4">
    <div class="w-full max-w-md bg-neutral-900 p-8 rounded-3xl border border-neutral-800 shadow-2xl">
      <div class="text-center mb-8">
        <a href="./index.html"><h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-pink-500">FRUIT JULS</h1></a>
        <p class="text-neutral-400 mt-2">Panel de Administración</p>
      </div>

      <form id="login-form" class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-neutral-400 mb-2">Correo</label>
          <input type="email" id="admin-email" required class="w-full bg-black border border-neutral-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-pink-500" />
        </div>
        <div>
          <label class="block text-sm font-medium text-neutral-400 mb-2">Contraseña</label>
          <input type="password" id="admin-password" required class="w-full bg-black border border-neutral-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-pink-500" />
        </div>
        <button type="submit" id="login-btn" class="w-full py-4 rounded-xl bg-gradient-to-r from-orange-500 to-pink-600 text-white font-bold">
          Ingresar
        </button>
      </form>
    </div>
  </main>

  <div id="dashboard-view" class="hidden min-h-screen flex flex-col md:flex-row">
    
    <aside class="w-full md:w-64 bg-neutral-900 border-r border-neutral-800 p-6 flex flex-col">
      <div class="mb-10">
        <a href="./productos.html"><h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-pink-500">FRUIT JULS</h1></a>
      </div>
      <nav class="flex-grow space-y-2">
        <button class="w-full flex items-center gap-3 px-4 py-3 bg-neutral-800 text-white rounded-xl font-medium">
          <i data-lucide="package" class="w-5 h-5 text-pink-500"></i> Productos
        </button>
      </nav>
      <button id="logout-btn" class="mt-auto flex items-center gap-3 px-4 py-3 text-neutral-400 hover:text-red-400 hover:bg-neutral-800 rounded-xl w-full text-left">
        <i data-lucide="log-out" class="w-5 h-5"></i> Cerrar Sesión
      </button>
    </aside>

    <main class="flex-grow p-6 md:p-10 overflow-y-auto">
      <header class="flex justify-between items-center mb-10">
        <h2 class="text-2xl font-bold text-white">Gestión de Productos</h2>
        <button id="btn-nuevo-producto" class="px-5 py-2.5 rounded-xl bg-green-600 text-white font-bold hover:bg-green-500 flex items-center gap-2">
          <i data-lucide="plus" class="w-5 h-5"></i> Nuevo
        </button>
      </header>

      <section id="form-section" class="hidden bg-neutral-900 p-6 rounded-3xl border border-neutral-800 mb-10">
        <h3 id="form-title" class="text-xl font-bold text-white mb-6">Agregar Producto</h3>
        
        <form id="product-form" class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <input type="hidden" id="prod-id"> 
          <input type="hidden" id="prod-old-img"> 
          
          <div>
            <label class="block text-sm font-medium text-neutral-400 mb-2">Nombre *</label>
            <input type="text" id="prod-name" required class="w-full bg-black border border-neutral-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500" />
          </div>
          
          <div>
            <label class="block text-sm font-medium text-neutral-400 mb-2">Categoría *</label>
            <select id="prod-category" required class="w-full bg-black border border-neutral-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500">
              <option value="frutas">Frutas Secas</option>
              <option value="semillas">Semillas y Nueces</option>
              <option value="enchilados">Mixes Enchilados</option>
            </select>
          </div>

          <div>
            <label class="block text-sm font-medium text-neutral-400 mb-2">Precio *</label>
            <input type="number" id="prod-price" step="0.01" required class="w-full bg-black border border-neutral-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500" />
          </div>

          <div>
            <label class="block text-sm font-medium text-neutral-400 mb-2">Imagen *</label>
            <input type="file" id="prod-img" accept="image/*" class="w-full bg-black border border-neutral-800 rounded-xl px-4 py-2 text-white file:bg-pink-500 file:text-white file:rounded-full file:border-0 file:px-4 file:py-1 cursor-pointer" />
            <p id="img-help-text" class="text-xs text-neutral-500 mt-1">Formatos: JPG, PNG, WEBP.</p>
          </div>

          <div class="md:col-span-2">
            <label class="block text-sm font-medium text-neutral-400 mb-2">Descripción</label>
            <textarea id="prod-desc" required rows="2" class="w-full bg-black border border-neutral-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500"></textarea>
          </div>

          <div class="md:col-span-2">
            <label class="block text-sm font-medium text-neutral-400 mb-2">Ingredientes / Notas</label>
            <textarea id="prod-note" required rows="2" class="w-full bg-black border border-neutral-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500"></textarea>
          </div>

          <div class="md:col-span-2 flex justify-end gap-4">
            <button type="button" id="btn-cancelar" class="px-6 py-3 rounded-xl border border-neutral-700 text-neutral-300">Cancelar</button>
            <button type="submit" id="btn-guardar" class="px-6 py-3 rounded-xl bg-blue-600 text-white font-bold flex items-center gap-2">
              <i data-lucide="save" class="w-5 h-5"></i> Guardar
            </button>
          </div>
        </form>
      </section>

      <section class="bg-neutral-900 rounded-3xl border border-neutral-800 overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-left border-collapse">
            <thead>
              <tr class="bg-black/50 border-b border-neutral-800 text-neutral-400 text-sm">
                <th class="p-4 font-medium">Imagen</th>
                <th class="p-4 font-medium">Nombre</th>
                <th class="p-4 font-medium">Precio</th>
                <th class="p-4 font-medium">Descripción</th>
                <th class="p-4 font-medium text-right">Ingredientes / Notas</th>
                <th class="p-4 font-medium text-right">Acciones</th>
                
              </tr>
            </thead>
            <tbody id="admin-products-table" class="divide-y divide-neutral-800">
              <tr><td colspan="4" class="p-8 text-center text-neutral-500">Cargando...</td></tr>
            </tbody>
          </table>
        </div>
      </section>

    </main>
  </div>

  <script>
    lucide.createIcons();

    // Toggle para mostrar/ocultar el formulario de productos
    const formSection = document.getElementById('form-section');
    const btnNuevoProducto = document.getElementById('btn-nuevo-producto');
    const btnCancelar = document.getElementById('btn-cancelar');
    const productForm = document.getElementById('product-form');

    btnNuevoProducto.addEventListener('click', () => {
      productForm.reset();
      document.getElementById('prod-id').value = ''; // Limpiar el ID
      formSection.classList.remove('hidden');
    });

    btnCancelar.addEventListener('click', () => {
      formSection.classList.add('hidden');
      productForm.reset();
    });
  </script>
  <script type="module" src="js/admin.js"></script>
  </body>
</html>
